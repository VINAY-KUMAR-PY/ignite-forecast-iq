name: Gemini Live Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/gemini-live-smoke.yml"
      - "backend/gemini.py"
      - "backend/main.py"
      - "backend/schemas.py"
      - "requirements.txt"
      - "scripts/gemini_live_smoke.py"

permissions:
  contents: read

jobs:
  gemini-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_TEMPERATURE: "0.2"
      GEMINI_TIMEOUT_SECONDS: "60"
      GEMINI_MAX_ATTEMPTS: "3"
      GEMINI_RETRY_BACKOFF_SECONDS: "2"
      GEMINI_MAX_OUTPUT_TOKENS: "3072"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Mask Gemini secret
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "::add-mask::$GEMINI_API_KEY"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-app.txt

      - name: Run live Gemini smoke test
        run: python scripts/gemini_live_smoke.py
