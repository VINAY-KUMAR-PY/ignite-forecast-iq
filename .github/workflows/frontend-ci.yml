name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "index.html"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "src/**"
      - "public/**"
  pull_request:
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "index.html"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "src/**"
      - "public/**"
  workflow_dispatch:

jobs:
  frontend:
    name: npm ci, unit tests, and production build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build production frontend
        run: npm run build
