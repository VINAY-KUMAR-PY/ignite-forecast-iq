name: Evaluator CI

on:
  push:
  pull_request:

env:
  PYTHONPATH: .

jobs:
  minimal-grading-path:
    name: Minimal grading path / requirements.txt only
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install minimal evaluator dependencies only
        run: python -m pip install -r requirements.txt

      - name: Run exact committed-sample grading command
        run: |
          chmod +x run.sh
          ./run.sh ./data ./pickle/model.pkl ./output/predictions.csv

      - name: Validate committed-sample grading output
        run: |
          python - <<'PY'
          import math
          from pathlib import Path

          import pandas as pd

          expected_columns = [
              "level",
              "segment",
              "horizon_days",
              "expected_revenue",
              "lower_revenue",
              "upper_revenue",
              "expected_roas",
              "lower_roas",
              "upper_roas",
              "model_type",
              "interval_width_pct",
              "forecast_confidence",
          ]
          output = Path("output/predictions.csv")
          if not output.exists():
              raise SystemExit("output/predictions.csv was not created")

          frame = pd.read_csv(output)
          if frame.empty:
              raise SystemExit("predictions.csv is empty")
          if list(frame.columns) != expected_columns:
              raise SystemExit(f"Unexpected schema: {list(frame.columns)}")
          if frame.isna().any().any():
              raise SystemExit("predictions.csv contains NaN values")

          numeric_columns = expected_columns[2:9] + ["interval_width_pct"]
          for column in numeric_columns:
              values = pd.to_numeric(frame[column], errors="raise")
              if not values.map(math.isfinite).all():
                  raise SystemExit(f"{column} contains infinite or non-finite values")

          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if not modes <= trained_modes or "trained_model" not in modes:
              raise SystemExit(f"Committed sample must use trained_model variants only, got {sorted(modes)}")

          print("Minimal grading path OK:", len(frame), "rows", sorted(modes))
          PY

      - name: Golden numeric forecast regression check
        run: |
          python - <<'PY'
          import pandas as pd

          actual = pd.read_csv("output/predictions.csv").sort_values(["level", "segment", "horizon_days"]).reset_index(drop=True)
          golden = pd.read_csv("tests/fixtures/golden_predictions_sample.csv").sort_values(["level", "segment", "horizon_days"]).reset_index(drop=True)
          keys = ["level", "segment", "horizon_days"]
          if not actual[keys].equals(golden[keys]):
              raise SystemExit("Golden regression keys changed")
          if actual["model_type"].tolist() != golden["model_type"].tolist():
              raise SystemExit("Golden regression model_type values changed")
          if actual["forecast_confidence"].tolist() != golden["forecast_confidence"].tolist():
              raise SystemExit("Golden regression confidence labels changed")
          numeric_columns = [
              "expected_revenue",
              "lower_revenue",
              "upper_revenue",
              "expected_roas",
              "lower_roas",
              "upper_roas",
              "interval_width_pct",
          ]
          for column in numeric_columns:
              max_delta = (actual[column].astype(float) - golden[column].astype(float)).abs().max()
              if float(max_delta) > 0.05:
                  raise SystemExit(f"Golden regression drift in {column}: {max_delta}")
          print("Golden numeric forecast regression OK:", len(actual), "rows")
          PY

  docker-evaluator-smoke:
    name: Docker evaluator smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build evaluator image
        run: docker build -t forecastiq-evaluator .

      - name: Run offline evaluator inside image
        run: docker run --rm forecastiq-evaluator

  evaluator:
    name: Offline evaluator / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install evaluator dependencies
        run: python -m pip install -r requirements.txt

      - name: Confirm app-only packages are absent
        run: |
          python - <<'PY'
          import sys, importlib.util
          for m in ['pydantic', 'fastapi', 'xgboost', 'slowapi', 'shap', 'httpx']:
              if importlib.util.find_spec(m):
                  sys.exit(f'{m} unexpectedly importable')
          for m in ['google.genai', 'google.generativeai']:
              try:
                  found = importlib.util.find_spec(m)
              except ModuleNotFoundError:
                  found = None
              if found:
                  sys.exit(f'{m} unexpectedly importable')
          print('Minimal evaluator environment confirmed.')
          PY

      - name: Generate predictions through the evaluator contract
        run: |
          chmod +x run.sh
          ./run.sh ./data ./pickle/model.pkl ./output/predictions.csv
          echo "--- Testing budget-json path ---"
          ./run.sh ./data ./pickle/model.pkl ./output/predictions_budget.csv '{"Google Ads":60000,"Meta Ads":35000,"Microsoft Ads":18000}'
          python - <<'PY'
          import pandas as pd

          df = pd.read_csv("output/predictions_budget.csv")
          if df.empty or df.isna().any().any():
              raise SystemExit("Budget predictions.csv is empty or contains NaN")
          if set(df["horizon_days"].astype(int)) != {30, 60, 90}:
              raise SystemExit(f"Unexpected horizons in budget run: {sorted(df['horizon_days'].unique().tolist())}")
          print("Budget-json offline path: OK,", len(df), "rows")
          PY
          python - <<'PY'
          import json
          import subprocess

          import pandas as pd

          sample = pd.read_csv("data/sample_campaigns.csv")
          channel = "Google Ads"
          channel_rows = sample[sample["channel"] == channel].copy()
          channel_rows["date"] = pd.to_datetime(channel_rows["date"])
          daily = channel_rows.groupby("date", as_index=False)["spend"].sum().sort_values("date")
          base_budget = float(daily.tail(7)["spend"].sum()) / min(7, len(daily)) * 30

          cases = {
              "low": base_budget * 0.50,
              "high": base_budget * 10.0,
          }
          for label, budget in cases.items():
              subprocess.run(
                  [
                      "./run.sh",
                      "./data",
                      "./pickle/model.pkl",
                      f"./output/predictions_budget_{label}.csv",
                      json.dumps({channel: budget}),
                  ],
                  check=True,
              )

          def channel_roas(path):
              frame = pd.read_csv(path)
              row = frame[
                  (frame["level"] == "channel")
                  & (frame["segment"] == channel)
                  & (frame["horizon_days"].astype(int) == 30)
              ].iloc[0]
              return float(row["expected_roas"])

          low_roas = channel_roas("./output/predictions_budget_low.csv")
          high_roas = channel_roas("./output/predictions_budget_high.csv")
          if not high_roas < low_roas:
              raise SystemExit(f"Budget saturation not visible: low ROAS={low_roas}, high ROAS={high_roas}")
          print(f"Budget saturation OK: {channel} 30d ROAS low={low_roas:.2f}, high={high_roas:.2f}")
          PY

      - name: Validate evaluator output contract
        run: |
          python - <<'PY'
          import math
          import sys
          from pathlib import Path

          import pandas as pd

          output = Path("output/predictions.csv")
          required = [
              "level", "segment", "horizon_days", "expected_revenue",
              "lower_revenue", "upper_revenue", "expected_roas",
              "lower_roas", "upper_roas", "model_type",
              "interval_width_pct", "forecast_confidence",
          ]
          if not output.exists():
              raise SystemExit("predictions.csv was not created")
          frame = pd.read_csv(output)
          if frame.empty or list(frame.columns) != required:
              raise SystemExit(f"Invalid output shape/schema: {frame.shape}, {list(frame.columns)}")
          if set(frame["horizon_days"].astype(int)) != {30, 60, 90}:
              raise SystemExit(f"Unexpected horizons: {sorted(frame['horizon_days'].unique().tolist())}")
          if frame.isna().any().any():
              raise SystemExit("predictions.csv contains NaN values")
          numeric = [
              "expected_revenue", "lower_revenue", "upper_revenue",
              "expected_roas", "lower_roas", "upper_roas",
          ]
          for column in numeric:
              values = pd.to_numeric(frame[column], errors="raise")
              if not values.map(math.isfinite).all():
                  raise SystemExit(f"{column} contains non-finite values")
          if not (frame["lower_roas"] <= frame["expected_roas"]).all():
              raise SystemExit("lower_roas exceeds expected_roas")
          if not (frame["expected_roas"] <= frame["upper_roas"]).all():
              raise SystemExit("expected_roas exceeds upper_roas")

          overall = frame[frame["level"] == "overall"].copy()
          overall["horizon_days"] = overall["horizon_days"].astype(int)
          if set(overall["horizon_days"].tolist()) == {30, 60, 90}:
              o = overall.set_index("horizon_days")
              w30 = float(o.loc[30, "interval_width_pct"])
              w60 = float(o.loc[60, "interval_width_pct"])
              w90 = float(o.loc[90, "interval_width_pct"])
              if not (w90 >= w60 >= w30):
                  raise SystemExit(
                      f"Intervals not monotonically widening: 30d={w30} 60d={w60} 90d={w90}"
                  )
              print(f"Interval widening OK: {w30}% -> {w60}% -> {w90}%")

          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if not modes <= trained_modes or "trained_model" not in modes:
              raise SystemExit(f"Supported evaluator runtime must use trained_model variants only, got: {sorted(modes)}")
          print(f"Validated {len(frame)} rows on Python {sys.version.split()[0]} using {sorted(modes)}")
          PY

      - name: Validate causal summary with budget path
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("output/causal_summary.txt").read_text(encoding="utf-8")
          if len(text) < 300:
              raise SystemExit("causal_summary.txt is too short or missing")
          print("Causal summary OK:", len(text), "chars")
          PY
          python - <<'PY'
          from pathlib import Path
          import subprocess

          result = subprocess.run(
              [
                  "bash",
                  "run.sh",
                  "./data",
                  "./pickle/model.pkl",
                  "./output/predictions_budget2.csv",
                  '{"Google Ads":55000,"Meta Ads":28000}',
              ],
              capture_output=True,
              text=True,
          )
          if result.returncode != 0:
              print(result.stderr)
              raise SystemExit("Budget run failed in causal summary validation")
          summary = Path("output/causal_summary.txt").read_text(encoding="utf-8")
          if "Planned budget input received" not in summary:
              raise SystemExit("causal_summary.txt does not contain budget note when budget provided")
          print("Budget causal summary OK")
          PY

      - name: Validate causal summary
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("output/causal_summary.txt")
          if not p.exists():
              raise SystemExit("causal_summary.txt missing")
          text = p.read_text()
          if len(text) < 300:
              raise SystemExit("causal_summary.txt missing or too short")
          if "Anomaly signals" not in text and "No anomalies" not in text:
              raise SystemExit("causal_summary.txt missing anomaly section")
          if "Causal effect estimates (observational DiD" not in text:
              raise SystemExit("causal_summary.txt missing DiD section")
          if "incremental revenue $" not in text:
              raise SystemExit("causal_summary.txt missing numeric DiD estimates")
          if "No causal estimate available" in text:
              raise SystemExit("sample data should produce real DiD estimates, not sparse-history fallback")
          known_channels = {"Google Ads", "Meta Ads", "Microsoft Ads"}
          found = [c for c in known_channels if c in text]
          if not found:
              raise SystemExit("causal_summary.txt contains no recognized channel names")
          print("Channel names found in summary:", found)
          print("Causal summary OK:", len(text), "chars")
          PY

      - name: Validate optional live-AI flag fallback path
        env:
          GEMINI_API_KEY: fake-ci-key
          GEMINI_MAX_ATTEMPTS: "1"
          GEMINI_TIMEOUT_SECONDS: "1"
        run: |
          ./run.sh ./data ./pickle/model.pkl ./output/predictions_live_flag.csv --enable-live-ai
          python - <<'PY'
          from pathlib import Path

          text = Path("output/causal_summary.txt").read_text(encoding="utf-8")
          if "Optional Live Gemini Enrichment" not in text:
              raise SystemExit("live-AI flag did not exercise optional enrichment path")
          if "deterministic offline causal summary above remains the authoritative evaluator output" not in text:
              raise SystemExit("live-AI fallback did not preserve deterministic evaluator summary")
          print("Optional live-AI flag fallback path OK")
          PY

  pickle-compatibility-matrix:
    name: Pickle compatibility / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install evaluator dependencies
        run: python -m pip install -r requirements.txt

      - name: Run committed pickle through offline evaluator
        run: |
          chmod +x run.sh
          ./run.sh ./data ./pickle/model.pkl ./output/predictions.csv
          python - <<'PY'
          import pandas as pd
          frame = pd.read_csv("output/predictions.csv")
          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if not modes <= trained_modes or "trained_model" not in modes:
              raise SystemExit(f"Expected trained_model variants from committed pickle, got {sorted(modes)}")
          if len(frame) != 54:
              raise SystemExit(f"Expected 54 rows from committed sample data, got {len(frame)}")
          print("Pickle compatibility OK:", len(frame), "rows", sorted(modes))
          PY

  exact-sklearn-zero-fallback:
    name: Exact sklearn zero-fallback guard
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install exact evaluator dependencies without cache
        run: |
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir --force-reinstall --no-deps scikit-learn==1.9.0

      - name: Assert trained-model output has no fallback warning
        run: |
          mkdir -p output
          set -o pipefail
          python -m backend.predict --data-dir ./data --model ./pickle/model.pkl --output ./output/predictions.csv 2>&1 | tee ./output/exact_sklearn.log
          if grep -q "differs from artifact build version" ./output/exact_sklearn.log; then
            echo "Unexpected sklearn mismatch fallback warning under exact pinned runtime"
            exit 1
          fi
          python - <<'PY'
          import sys
          from pathlib import Path

          import pandas as pd
          import sklearn

          output = Path("output/predictions.csv")
          frame = pd.read_csv(output)
          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if not modes <= trained_modes or "trained_model" not in modes:
              raise SystemExit(f"Expected trained_model variants under sklearn {sklearn.__version__}, got {sorted(modes)}")
          if len(frame) != 54:
              raise SystemExit(f"Expected 54 committed-sample rows, got {len(frame)}")
          print(
              f"sklearn {sklearn.__version__} produced trained_model variant output with no fallback warning "
              f"on Python {sys.version.split()[0]}"
          )
          PY

  sklearn-version-drift-smoke:
    name: sklearn drift tolerance / ${{ matrix.scikit-learn-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scikit-learn-version: ["1.7.2", "1.8.0"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install evaluator dependencies and alternate sklearn
        run: |
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir --force-reinstall --no-deps scikit-learn==${{ matrix.scikit-learn-version }}

      - name: Assert drift is trained or loudly guarded
        run: |
          mkdir -p output
          set +e
          python -m backend.predict --data-dir ./data --model ./pickle/model.pkl --output ./output/predictions.csv > ./output/sklearn_drift.log 2>&1
          status=$?
          set -e
          cat ./output/sklearn_drift.log
          if [ "$status" -ne 0 ]; then
            if grep -Eqi "sklearn|scikit|artifact|FORECASTIQ WARNING|version incompatible" ./output/sklearn_drift.log; then
              echo "Alternate sklearn runtime failed loudly with compatibility context as expected."
              exit 0
            fi
            echo "Alternate sklearn runtime failed without a clear compatibility warning."
            exit "$status"
          fi
          python - <<'PY'
          from pathlib import Path

          import pandas as pd

          log_text = Path("output/sklearn_drift.log").read_text(encoding="utf-8")
          frame = pd.read_csv("output/predictions.csv")
          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if modes <= trained_modes and "trained_model" in modes:
              print("Alternate sklearn runtime produced trained_model variant output.")
          elif modes == {"safe_baseline_fallback"} and (
              "FORECASTIQ WARNING: SAFE BASELINE FALLBACK WAS USED" in log_text
              or "differs from artifact build version" in log_text
          ):
              print("Alternate sklearn runtime used safe fallback with loud compatibility warning.")
          else:
              raise SystemExit(f"Unexpected silent model mode under alternate sklearn: {sorted(modes)}")
          PY

  mocked-live-ai-path:
    name: Mocked optional live-AI path
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install application dependencies
        run: python -m pip install -r requirements-app.txt

      - name: Exercise explicit live-AI path with mocked Gemini transport
        env:
          GEMINI_API_KEY: fake-ci-key
        run: |
          # Mocked smoke test only: no real Gemini secret, network call, or provider dependency.
          python -m pytest tests/test_offline_predict.py -q -m live_ai_mocked

  app-tests:
    name: Backend application and trained artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install application dependencies
        run: python -m pip install -r requirements-app.txt

      - name: Full run.sh contract test
        run: python -m pytest tests/test_run_sh_contract.py -q

      - name: Compile and test backend
        run: |
          python -m compileall backend scripts tests -q
          python -m pytest --durations=10
          python -m backend.backtest
          python scripts/validate_budget_elasticity.py --data-dir data --output-dir reports

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --durations=10 --junitxml=pytest-results.xml --cov=backend --cov-report=term-missing --cov-report=json --cov-fail-under=92.05
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          coverage = json.loads(Path("coverage.json").read_text())
          total = float(coverage["totals"]["percent_covered"])
          pytest_root = ET.parse("pytest-results.xml").getroot()
          tests = int(pytest_root.attrib.get("tests", 0))
          skipped = int(pytest_root.attrib.get("skipped", 0))
          failures_count = int(pytest_root.attrib.get("failures", 0))
          errors = int(pytest_root.attrib.get("errors", 0))
          passed = max(0, tests - skipped - failures_count - errors)
          required_modules = [
              "backend/decision_support.py",
              "backend/evaluator_io.py",
              "backend/gemini.py",
              "backend/inference.py",
              "backend/train.py",
          ]
          module_rows = []
          module_failures = []
          for module in required_modules:
              file_data = coverage["files"].get(module) or coverage["files"].get(module.replace("/", "\\"))
              if not file_data:
                  module_failures.append(f"{module}: missing from coverage report")
                  continue
              pct = float(file_data["summary"]["percent_covered"])
              module_rows.append((module, pct))
              if pct < 75.0:
                  module_failures.append(f"{module}: {pct:.2f}% < 75%")
          if module_failures:
              raise SystemExit("Per-module coverage gate failed:\n" + "\n".join(module_failures))
          print(f"Backend tests: {passed} passed, {skipped} skipped, {failures_count} failed, {errors} errors")
          print(f"Backend coverage: {total:.2f}%")
          for module, pct in module_rows:
              print(f"{module}: {pct:.2f}%")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Backend coverage\n\n")
              handle.write(f"- Backend tests: **{passed} passed**, **{skipped} skipped**, **{failures_count} failed**, **{errors} errors**\n")
              handle.write(f"- Overall backend coverage: **{total:.2f}%**\n")
              handle.write("- Required gate: **92.05%** via `--cov-fail-under=92.05`\n")
              handle.write("- Required high-risk module gate: **75%** each\n")
              for module, pct in module_rows:
                  handle.write(f"  - `{module}`: **{pct:.2f}%**\n")
          PY

      - name: Verify committed trained artifact
        run: |
          python -m backend.predict --data-dir ./data --model ./pickle/model.pkl --output ./output/predictions.csv
          python - <<'PY'
          import pandas as pd
          frame = pd.read_csv("output/predictions.csv")
          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if not modes <= trained_modes or "trained_model" not in modes:
              raise SystemExit(f"The committed artifact did not produce trained_model variants: {sorted(modes)}")
          print("Committed trained artifact verified.")
          PY

  frontend:
    name: Frontend tests, typecheck, lint, and production build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: |
          set -o pipefail
          npm run test 2>&1 | tee vitest-output.txt

      - name: Check frontend
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Reject high-severity production advisories
        run: npm audit --omit=dev --audit-level=high

      - name: Publish frontend validation summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("vitest-output.txt").read_text(encoding="utf-8", errors="replace")
          passed = re.search(r"Tests\s+(\d+)\s+passed", text)
          files = re.search(r"Test Files\s+(\d+)\s+passed", text)
          passed_tests = passed.group(1) if passed else "unknown"
          passed_files = files.group(1) if files else "unknown"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Frontend validation\n\n")
              handle.write(f"- Vitest: **{passed_tests} tests passed** across **{passed_files} files**\n")
              handle.write("- TypeScript, lint, and production build: passed in `Check frontend` and `Build frontend`\n")
              handle.write("- Production audit: high-severity advisories rejected by `npm audit --omit=dev --audit-level=high`\n")
          PY

  e2e-demo:
    name: Playwright judge demo flow
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: python -m pip install -r requirements-app.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright demo check
        run: npm run test:e2e

  hackathon-evaluator-protocol:
    name: Hackathon 5-step evaluator protocol
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install evaluator-only dependencies
        run: python -m pip install -r requirements.txt

      - name: Replace data folder with held-out-style fixture
        run: |
          rm -rf data
          mkdir -p data
          python scripts/generate_synthetic_marketing_csv.py --output data/heldout_synthetic.csv --rows 50400

      - name: Run submission command with positional args only
        run: |
          chmod +x run.sh
          ./run.sh ./data ./pickle/model.pkl ./output/predictions.csv

      - name: Validate evaluator output
        run: |
          python - <<'PY'
          import math
          from pathlib import Path
          import pandas as pd

          required = [
              "level", "segment", "horizon_days", "expected_revenue",
              "lower_revenue", "upper_revenue", "expected_roas",
              "lower_roas", "upper_roas", "model_type",
              "interval_width_pct", "forecast_confidence",
          ]
          output = Path("output/predictions.csv")
          if not output.exists():
              raise SystemExit("predictions.csv missing")
          frame = pd.read_csv(output)
          if frame.empty or list(frame.columns) != required:
              raise SystemExit(f"Invalid evaluator output: {frame.shape}, {list(frame.columns)}")
          if set(frame["horizon_days"].astype(int)) != {30, 60, 90}:
              raise SystemExit("Missing required horizons")
          if frame.isna().any().any():
              raise SystemExit("NaN values detected")
          for column in required[3:9]:
              values = pd.to_numeric(frame[column], errors="raise")
              if not values.map(math.isfinite).all():
                  raise SystemExit(f"{column} contains non-finite values")
              if (values < 0).any():
                  raise SystemExit(f"{column} contains negative values")
          modes = set(frame["model_type"].astype(str))
          trained_modes = {"trained_model", "trained_model_baseline_anchored", "trained_model_estimated_spend"}
          if not modes <= trained_modes or "trained_model" not in modes:
              raise SystemExit("Held-out evaluator protocol must use trained_model variants on supported CI runtime")
          print("Hackathon evaluator protocol passed:", len(frame), "rows")
          PY

      - name: Validate malformed hidden-data fallback fixtures
        run: |
          for fixture in tests/fixtures/hidden_missing_columns.csv tests/fixtures/hidden_single_channel_malformed.csv; do
            rm -rf data output
            mkdir -p data output
            cp "$fixture" data/hidden_fixture.csv
            ./run.sh ./data ./pickle/model.pkl ./output/predictions.csv
            FIXTURE="$fixture" python - <<'PY'
          import os
          import pandas as pd

          frame = pd.read_csv("output/predictions.csv")
          modes = set(frame["model_type"].astype(str))
          if modes != {"safe_baseline_fallback"}:
              raise SystemExit(f"{os.environ['FIXTURE']} expected safe_baseline_fallback, got {sorted(modes)}")
          if frame.empty or frame.isna().any().any():
              raise SystemExit(f"{os.environ['FIXTURE']} produced empty or NaN output")
          print(f"{os.environ['FIXTURE']} fallback OK: {len(frame)} rows")
          PY
          done
