name: Evaluator CI

on:
  push:
  pull_request:

jobs:
  evaluator:
    name: Offline evaluator contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall backend scripts tests -q

      - name: Run Python tests
        run: python -m pytest

      - name: Generate evaluator predictions
        run: python -m backend.predict --data-dir ./data --model ./pickle/model.pkl --output ./output/predictions.csv

      - name: Validate evaluator output contract
        run: |
          python - <<'PY'
          import math
          from pathlib import Path

          import pandas as pd

          output = Path("output/predictions.csv")
          required = [
              "level",
              "segment",
              "horizon_days",
              "expected_revenue",
              "lower_revenue",
              "upper_revenue",
              "expected_roas",
              "model_type",
          ]

          if not output.exists():
              raise SystemExit("predictions.csv was not created")

          frame = pd.read_csv(output)
          if frame.empty:
              raise SystemExit("predictions.csv is empty")
          if list(frame.columns) != required:
              raise SystemExit(f"Unexpected schema: {list(frame.columns)}")
          if set(frame["horizon_days"].astype(int)) != {30, 60, 90}:
              raise SystemExit(f"Unexpected horizons: {sorted(frame['horizon_days'].unique().tolist())}")
          if frame.isna().any().any():
              raise SystemExit("predictions.csv contains NaN values")
          for column in ["expected_revenue", "lower_revenue", "upper_revenue", "expected_roas"]:
              values = pd.to_numeric(frame[column], errors="raise")
              if not values.map(math.isfinite).all():
                  raise SystemExit(f"{column} contains infinite or non-finite values")
          if "trained_model" not in set(frame["model_type"].astype(str)):
              raise SystemExit(f"trained_model missing from model_type values: {frame['model_type'].unique().tolist()}")

          print(f"Validated {len(frame)} prediction rows with trained_model present.")
          PY
