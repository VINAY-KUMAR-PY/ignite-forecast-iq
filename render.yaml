services:
  - type: web
    name: forecastiq-api
    runtime: python
    buildCommand: pip install -r requirements-app.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_TIMEOUT_SECONDS
        value: "45"
      - key: GEMINI_MAX_ATTEMPTS
        value: "3"
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
